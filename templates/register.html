<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error { color: #e74c3c; background: #fdeaea; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 10px; }
        .success { color: #2ecc71; background: #e8f8f0; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="center-box">
    <form method="POST" class="glass">
        <h2>📝 Create Account</h2>

        {% if msg %}
            <p class="success">{{ msg }}</p>
        {% endif %}

        {% if error_msg %}
            <p class="error">{{ error_msg }}</p>
        {% endif %}

        <div class="input-box">
            <input type="text" name="name" required>
            <label>Full Name</label>
        </div>

        <div class="input-box">
            <input type="email" name="email_id" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="text" name="phone_no" required>
            <label>Phone Number</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit">Join Now</button>

        <p>Already a member? <a href="/login">Login</a></p>
    </form>
</div>

</body>
</html>
