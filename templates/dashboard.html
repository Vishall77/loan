<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | LoanAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .dashboard-container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        /* Table Styling */
        .history-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; color: #555; font-weight: 600; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background: #fcfcfc; }

        /* Badge Styling */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-y { background: #e8f8f0; color: #2ecc71; }
        .badge-n { background: #fdeaea; color: #e74c3c; }
        
        .btn-new { background: #4361ee; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-new:hover { background: #3046bc; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="navbar">
    <h2>🏦 LoanAI Dashboard</h2>
    <div>
        <span style="color: #e74c3c;"><strong>Welcome {{user[1]}}</strong></span>
        <a href="/logout" style="color: #e74c3c;">Logout</a>
    </div>
</div>

<div class="dashboard-container">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="/predict" class="btn-new">+ New Prediction</a>
    </div>
</body>
</html>
