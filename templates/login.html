<form method="POST">
    <h2>Login</h2>

    <input type="email" name="email_id" placeholder="Enter Email" required>
    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Login</button>

    {% if msg %}
        <p>{{ msg }}</p>
    {% endif %}
</form>

<a href="/register">Create Account</a>
